<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/Form.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary py-3 w-100 position z-3">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">LEONES</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav w-100 mb-2 mb-lg-0 justify-content-evenly fst-italic">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html#seccionNoticias">NOTICIAS</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="fotos.html">FOTOS</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Contacto.html">CONTACTO</a>
                    </li>
                </ul>
                <a class="btn btn-primary" href="Form.html">ASOCIARSE</a>
            </div>
        </div>
        <a href="index.html"><img src="img/LogoConBorde.png" alt="logo del club" id="logoNav"></a>
    </nav>
    <!-- Form -->
    <div class="container my-5">
        <div class="row bg-body-secondary">
            <div class="col-md-6 g-0">
                <img src="img/abrazojugadoresEspalda.jpg" style="height: 100%; width:100%; object-fit: cover;" alt="">
            </div>
            <div class="col-md-6">
                <form class="container my-5" method="get" id="form">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="exampleInputNombre1" class="form-label" id="">Nombre</label>
                            <input type="text" name="Nombre" class="form-control" id="nombre">
                            <cite id="nombreWarning">*Ingrese su nombre</cite>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="exampleInputApellido1" class="form-label" id="">Apellido</label>
                            <input type="text" name="Apellido" class="form-control" id="apellido">
                            <cite>*Ingrese su apellido</cite>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="exampleDNI" class="form-label" id="">DNI</label>
                            <input type="text" name="exampleDNI" class="form-control" id="dni">
                            <cite>*Ingrese su DNI</cite>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="exampeCiudad" class="form-label" id="">Ciudad</label>
                            <input type="text" name="exampeCiudad" class="form-control" id="ciudad">
                        </div>
                    </div>
                    <div class="row mt-1 mt-md-5">
                        <div class="col-md-6 mb-3">
                            <label for="exampleContraseña" class="form-label" id="">Contraseña</label>
                            <input type="password" name="exampleContraseña" class="form-control" id="contraseña">
                        </div>
                        <div class="col-md-6 mb-3" id="text-contraseña">
                            <ul>
                                <li id="caracter">Al menos 7 caracteres</li>
                                <li id="mayuscula">Mayúscula</li>
                                <li id="numero">Al menos un número</li>
                            </ul>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <label for="exampleInputMail" class="form-label" id="apellido">Mail</label>
                            <input type="email" name="email" class="form-control" id="exampleInputMail1">
                            <cite>*Ingrese su mail</cite>
                        </div>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="exampleCheck1">
                        <label class="form-check-label" for="exampleCheck1">Quiero recibir noticias por
                            e-mail</label>
                    </div>
                    <button type="submit" class="btn btn-primary">Enviar</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
